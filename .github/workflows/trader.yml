name: ETH Trader

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic yfinance cryptography pyjwt requests

      - name: Run trader
        env:
          COINBASE_API_KEY:    ${{ secrets.COINBASE_API_KEY }}
          COINBASE_API_SECRET: ${{ secrets.COINBASE_API_SECRET }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
        run: python coinbase_trader_v3.py

      - name: Save CSV log to repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add coinbase_trade_log.csv
          git diff --staged --quiet || git commit -m "Log update $(date -u '+%Y-%m-%d %H:%M')"
          git push
