name: Stock Trader

on:
  schedule:
    - cron: '30 8,12,16,20 * * 1-5'  # 4x per day, Mon-Fri only
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic yfinance requests

      - name: Run stock trader
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python alpaca_trader_v2.py

      - name: Save CSV log
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add alpaca_trade_log.csv
          git diff --staged --quiet || git commit -m "Stock log $(date -u '+%Y-%m-%d %H:%M')"
          git push
